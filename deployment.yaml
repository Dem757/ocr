apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ocr-storage-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-db
spec:
  selector:
    matchLabels:
      app: ocr-db
  template:
    metadata:
      labels:
        app: ocr-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          args:
            - -p
            - "5444"
          env:
            - name: POSTGRES_DB
              value: ocrdb
            - name: POSTGRES_USER
              value: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ocr-db-pass
                  key: password

---
apiVersion: v1
kind: Service
metadata:
  name: ocr-db
spec:
  type: LoadBalancer
  selector:
    app: ocr-db
  ports:
    - name: postgres
      port: 5444
      targetPort: 5444

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-web-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocr-frontend
  template:
    metadata:
      labels:
        app: ocr-frontend
    spec:
      containers:
        - name: frontend
          image: realdem757/ocr-frontend:latest
          env:
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: ocr-db-pass
                  key: password
            - name: UPLOAD_FOLDER
              value: "/app/uploads"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
          volumeMounts:
            - name: image-storage
              mountPath: /app/uploads
      volumes:
        - name: image-storage
          persistentVolumeClaim:
            claimName: ocr-storage-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: ocr-service
spec:
  type: NodePort
  selector:
    app: ocr-frontend
  ports:
    - name: http
      port: 80
      targetPort: 5000
      nodePort: 30007

---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
type: Opaque
stringData:
  username: rabbit
  password: changeme

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocr-worker
  template:
    metadata:
      labels:
        app: ocr-worker
    spec:
      containers:
        - name: worker
          image: realdem757/ocr-frontend:latest
          command: ["python", "worker.py"]
          env:
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: ocr-db-pass
                  key: password
            - name: UPLOAD_FOLDER
              value: "/app/uploads"
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
          volumeMounts:
            - name: image-storage
              mountPath: /app/uploads
      volumes:
        - name: image-storage
          persistentVolumeClaim:
            claimName: ocr-storage-pvc