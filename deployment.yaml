apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-web-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocr-frontend
  template:
    metadata:
      labels:
        app: ocr-frontend
    spec:
      containers:
      - name: frontend
        image: realdem757/ocr-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ocr-service
spec:
  type: NodePort
  selector:
    app: ocr-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007