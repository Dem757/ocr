name: OCR Build and Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted # Ez fogja használni a képernyőképeden látható runnert
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t ocr-frontend:latest .

      - name: Deploy to K3s
        run: sudo kubectl apply -f deployment.yaml